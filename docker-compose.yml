version: '3.8'
services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=lottodb
      - POSTGRES_USER=neo
      - POSTGRES_PASSWORD=lotto123
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_NAME=lottodb
      - POSTGRES_USER=neo
      - POSTGRES_PASSWORD=lotto123
    depends_on:
      - db
volumes:
  postgres_data:
