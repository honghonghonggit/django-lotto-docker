<!DOCTYPE html>
<html>
<head>
    <title>6/45 Lotto</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .lotto-card { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; }
        input { width: 40px; padding: 5px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>6/45 Lotto 구매</h1>
    <div class="lotto-card">
        <form method="POST">
            {% csrf_token %}
            <h3>수동 구매 (번호 6개 입력)</h3>
            <input type="number" name="n1" min="1" max="45">
            <input type="number" name="n2" min="1" max="45">
            <input type="number" name="n3" min="1" max="45">
            <input type="number" name="n4" min="1" max="45">
            <input type="number" name="n5" min="1" max="45">
            <input type="number" name="n6" min="1" max="45">
            <br><br>
            <button type="submit" name="buy_type" value="manual">수동 구매하기</button>
            <hr>
            <h3>자동 구매</h3>
            <button type="submit" name="buy_type" value="auto" style="background: #007bff;">자동 번호 생성 및 구매</button>
        </form>
    </div>
    <br><br>
    <a href="/admin">관리자 페이지로 이동</a>
</body>
</html>
